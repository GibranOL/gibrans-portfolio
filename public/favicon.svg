<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Minimalist dark background -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />
  
  <!-- Subtle border to match the dark mode aesthetics -->
  <rect width="100" height="100" rx="24" fill="none" stroke="#dc2626" stroke-width="4" stroke-opacity="0.3" />
  
  <!-- "G" Initial -->
  <text x="42" y="73" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">G</text>
  
  <!-- The signature red dot from "Gibran." navbar branding -->
  <circle cx="78" cy="66" r="10" fill="#dc2626" />
  <circle cx="78" cy="66" r="16" fill="#dc2626" opacity="0.3" /> <!-- Outer glow -->
</svg>
